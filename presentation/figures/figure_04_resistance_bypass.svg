<text x="140" y="638" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#1b6ca8">Interpretation</text>
<text x="140" y="668" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#10212b">Parental cells are mainly EGFR-driven, so receptor blockade substantially lowers downstream survival signaling.</text>
<rect x="690" y="610" width="430" height="90" rx="18" fill="#ffffff" stroke="#d1495b" stroke-width="2.2"/>
<text x="710" y="638" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#d1495b">Interpretation</text>
<text x="710" y="668" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#10212b">In resistance, MET reactivates ERBB3-PI3K signaling. EGFR+MET co-targeting suppresses the bypass more effectively than EGFR alone.</text>
